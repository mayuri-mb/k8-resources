apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    project: roboshop
    tier: frontend
    component: frontend
  annotations:
    kubernetes.io/change-cause: "moving to 1.29"  
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
      component: frontend  
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        component: frontend  
    spec:
      containers:
        - name: nginx 
          image: nginx:1.29

---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  selector:
    project: roboshop
    component: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80 
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
spec:
  clusterIP: None
  selector:
    project: roboshop
    component: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80             


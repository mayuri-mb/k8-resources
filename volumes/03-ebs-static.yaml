apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 5Gi
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4  
    volumeHandle: vol-018d7caeb112fc948  
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs
spec:
  storageClassName: ""
  volumeName: ebs
  accessModes:
    - ReadWriteOnce  
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod 
metadata:
  name: app
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - name: html-data
          mountPath: /usr/share/nginx/html
  nodeselector:
    topology.kubernetes.io/zone: us-east-1c    
  volumes:
    - name: html-data
      persistentVolumeClaim:
        claimName: ebs          




apiVersion: v1
kind: PersistentVolumeClaim  
metadata:
  name: efs-dynamic
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: roboshop-efs
  resources:
    requests:
      storage: 4Gi  
---
apiVersion: v1
kind: Pod 
metadata:
  name: app
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - name: html-data
          mountPath: /usr/share/nginx/html
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1c            
  volumes:
    - name: html-data
      persistentVolumeClaim:
        claimName: efs-dynamic             
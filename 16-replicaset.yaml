apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  labels:
    project: roboshop
    purpose: rs-demo
    tier: frontend
    component: frontend
spec: 
  replicas: 3
  #using these labels replicaset selects pods
  selector:
    matchLabels:
      project: roboshop
      purpose: rs-demo
      tier: frontend
      component: frontend
    #Pod definition, pod is subset of replicaset 
  template:   
    metadata:
      labels:
        project: roboshop
        purpose: rs-demo
        tier: frontend
        component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx  